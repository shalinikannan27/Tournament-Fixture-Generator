<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Fixture Generator | Pro Draw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* GUIDE FOR MANUAL WRITING */
        .manual-space {
            border-bottom: 1px dotted #ccc;
            height: 20px;
            width: 80%;
            margin: 10px auto;
        }
        .round-cell {
            padding: 0 !important; /* Allow centered content */
        }
        .match-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .round-controls {
            margin: 12px 0 14px;
            padding: 10px 12px;
            border: 1px solid #e2e2e2;
            border-radius: 10px;
            background: #fafafa;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            align-items: center;
            justify-content: center;
        }
        .round-controls .title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            margin-right: 4px;
        }
        .round-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <div class="header-icon">🏆</div>
            <div class="header-text">
                <h1>Tournament Fixture Generator</h1>
                <p>Professional Draw Sheet for Referees</p>
            </div>
        </header>

        <!-- SETUP PANEL -->
        <section class="panel">
            <h2 class="panel-title">⚙️ Tournament Configuration</h2>
            <div class="grid-config">
                <div class="field">
                    <label for="tname">Tournament Name</label>
                    <input type="text" id="tname" value="State Level Open Badminton Tournament 2026" placeholder="Enter tournament name">
                </div>
                <div class="field">
                    <label for="sport">Category / Event</label>
                    <select id="sport">
                        <option value="Men's Singles">Men's Singles</option>
                        <option value="Women's Singles">Women's Singles</option>
                        <option value="Men's Doubles">Men's Doubles</option>
                        <option value="Women's Doubles">Women's Doubles</option>
                        <option value="Mixed Doubles">Mixed Doubles</option>
                    </select>
                </div>
                <div class="field">
                    <label for="nplayers">Number of Players (2-128)</label>
                    <input type="number" id="nplayers" value="20" min="2" max="128">
                    <div class="quick-counts">
                        <button class="qbtn" onclick="setPlayerCount(4)">4</button>
                        <button class="qbtn" onclick="setPlayerCount(8)">8</button>
                        <button class="qbtn" onclick="setPlayerCount(16)">16</button>
                        <button class="qbtn" onclick="setPlayerCount(20)">20</button>
                        <button class="qbtn" onclick="setPlayerCount(32)">32</button>
                        <button class="qbtn" onclick="setPlayerCount(64)">64</button>
                    </div>
                </div>
                <div class="field">
                    <label for="tdates">Competition Dates</label>
                    <input type="text" id="tdates" value="May 12 - 15, 2026">
                </div>
                <div class="field">
                    <label for="tvenue">Venue</label>
                    <input type="text" id="tvenue" value="National Sports Indoor Complex">
                </div>
            </div>

            <div style="margin-top: 2rem;">
                <button class="btn-primary" onclick="generateBracket()">🏓 GENERATE DRAW SHEET</button>
            </div>
        </section>

        <!-- FIXTURE DISPLAY -->
        <section class="panel fixture-display" id="output-section" style="display: none;">
            <div id="bracket-title-header" style="text-align: center; margin-bottom: 20px;">
                <h2 id="display-tname" style="font-size: 1.5rem; text-transform: uppercase;"></h2>
                <p id="display-meta" style="font-size: 1.1rem; color: #555;"></p>
                <h3 id="display-category" style="font-size: 1.3rem; margin-top: 10px; border-bottom: 2px solid #333; display: inline-block; padding-bottom: 5px;"></h3>
            </div>
            <div id="round-controls" class="round-controls"></div>

            <div class="table-wrap">
                <table id="fixture-table">
                    <thead>
                        <tr id="table-headers">
                            <!-- Filled by JS -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>

            <!-- EXPORT ACTIONS -->
            <div class="export-bar">
                <div class="export-info">
                    <p><strong>Status:</strong> Professional Draw Generated</p>
                    <small>Timings are removed for manual entry by referee.</small>
                </div>
                <div class="export-btns">
                    <button class="btn-secondary" onclick="copyTSV()">📋 Copy for Excel</button>
                    <button class="btn-secondary" onclick="window.print()">🖨️ Print Sheet</button>
                    <button class="btn-secondary btn-excel" onclick="exportToExcel()">📊 Download Excel (.xlsx)</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        let currentBracket = null;
        let visibleRounds = [];

        function setPlayerCount(n) {
            document.getElementById('nplayers').value = n;
            document.querySelectorAll('.qbtn').forEach(b => {
                b.classList.toggle('active', parseInt(b.textContent) === n);
            });
        }

        async function generateBracket() {
            const nplayers = document.getElementById('nplayers').value;
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nplayers})
            });
            currentBracket = await res.json();
            visibleRounds = [...currentBracket.round_names];
            renderRoundControls();
            renderUI();
        }

        function renderRoundControls() {
            const wrap = document.getElementById('round-controls');
            if (!currentBracket || !wrap) return;

            wrap.innerHTML = `<span class="title">Round Columns:</span>` + currentBracket.round_names.map(nm => `
                <label class="round-chip">
                    <input type="checkbox" ${visibleRounds.includes(nm) ? 'checked' : ''} onchange="toggleRound('${nm}', this.checked)">
                    <span>${nm}</span>
                </label>
            `).join('');
        }

        function toggleRound(roundName, checked) {
            if (checked) {
                if (!visibleRounds.includes(roundName)) visibleRounds.push(roundName);
            } else {
                if (visibleRounds.length === 1) {
                    alert('At least one round column is required.');
                    renderRoundControls();
                    return;
                }
                visibleRounds = visibleRounds.filter(r => r !== roundName);
            }
            // Keep user-selected rounds in original progression order.
            visibleRounds = currentBracket.round_names.filter(r => visibleRounds.includes(r));
            renderRoundControls();
            renderUI();
        }

        function renderUI() {
            if (!currentBracket) return;

            // Titles
            document.getElementById('display-tname').textContent = document.getElementById('tname').value;
            document.getElementById('display-meta').textContent = `${document.getElementById('tdates').value} | ${document.getElementById('tvenue').value}`;
            document.getElementById('display-category').textContent = document.getElementById('sport').value;

            // Headers
            const headerRow = document.getElementById('table-headers');
            headerRow.innerHTML = `
                <th class="sl-col">SL</th>
                <th>NAME OF THE PLAYER</th>
                <th>INSTITUTION</th>
                ${visibleRounds.map(nm => `<th>${nm}</th>`).join('')}
            `;

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            const numRows = currentBracket.bracket_size;
            const roundNames = visibleRounds;

            // To track row-spanning skip logic
            const skipMap = Array.from({ length: numRows }, () => Array(roundNames.length).fill(false));

            for (let r = 0; r < numRows; r++) {
                const tr = document.createElement('tr');
                const p = currentBracket.players[r];

                // Fixed columns
                tr.innerHTML = `
                    <td class="sl-col">${p.sl}</td>
                    <td>
                        <input type="text" class="player-input" value="${p.name}" data-idx="${r}" data-field="name" onchange="updatePlayerData(this)">
                    </td>
                    <td>
                        <input type="text" class="inst-input" value="${p.inst || ''}" data-idx="${r}" data-field="inst" onchange="updatePlayerData(this)">
                    </td>
                `;

                // Round columns with Rowspan
                roundNames.forEach((nm, cIdx) => {
                    if (skipMap[r][cIdx]) return;

                    const rowSpan = Math.min(Math.pow(2, cIdx + 1), numRows);
                    const td = document.createElement('td');
                    td.className = 'round-cell';
                    td.rowSpan = rowSpan;
                    td.dataset.round = nm;

                    // Skip rows covered by this spanning
                    for (let s = 1; s < rowSpan; s++) {
                        if (r + s < numRows) skipMap[r + s][cIdx] = true;
                    }

                    // Content for manual writing
                    td.innerHTML = `
                        <div class="match-box">
                            <div class="manual-space"></div>
                            <div class="manual-space"></div>
                        </div>
                    `;
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            }

            document.getElementById('output-section').style.display = 'block';
        }

        function updatePlayerData(el) {
            const idx = el.dataset.idx;
            const field = el.dataset.field;
            currentBracket.players[idx][field] = el.value;
        }

        async function exportToExcel() {
            const payload = {
                tname: document.getElementById('tname').value,
                sport: document.getElementById('sport').value,
                tdates: document.getElementById('tdates').value,
                tvenue: document.getElementById('tvenue').value,
                players: currentBracket.players,
                round_names: visibleRounds,
                category: document.getElementById('sport').value
            };

            const res = await fetch('/export', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (payload.tname.replace(/ /g, '_') || 'tournament') + '.xlsx';
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        function copyTSV() {
            let tsv = "SL\tNAME\tINST\t" + visibleRounds.join("\t") + "\n";
            currentBracket.players.forEach((p, idx) => {
                tsv += `${p.sl}\t${p.name || ''}\t${p.inst || ''}\n`;
            });
            navigator.clipboard.writeText(tsv).then(() => {
                alert("Structure copied! (Note: Row-spans are converted to linear rows for Excel compatibility)");
            });
        }
    </script>
</body>
</html>
